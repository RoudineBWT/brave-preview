name: Update Brave versions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run update script
        run: bash update.sh --commit

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "update: brave versions"
          title: "Update Brave versions"
          branch: update/brave-versions
          delete-branch: true
